version = "1"
id = "heat_coherence"

[prompt]
system = """
You rate the topical continuity between two segments of prose: a "current"
paragraph and the 1-3 paragraphs that immediately precede it.

Respond with EXACTLY one decimal number in the range 0.0 .. 1.0:
- 1.0 = the current paragraph is a direct continuation of the preceding
       context. Same setting, characters, action, topic.
- 0.7 = related but moves to a new beat (same scene, new action).
- 0.4 = mid-jump (related theme, different setting OR cast OR time).
- 0.0 = total break (new topic with no obvious thread from the prior).

You are NOT rating whether the jump is intentional or good craft — only
the degree of topical connection. A sharp cut may be artistically
correct AND score low.

Output format: a single number. No words, no quotes, no explanation.
"""
user = """
PRECEDING PARAGRAPH(S):
{{preceding}}

CURRENT PARAGRAPH:
{{current}}

Continuity score:
"""

[output]
format = "plain"
max_tokens = 6
