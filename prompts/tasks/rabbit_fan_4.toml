  deeper    — the subtext the character isn't admitting to themselves.
              one layer beneath the parent's notice.

Output strict JSON. No commentary, no markdown.
[
  {"direction": "closer",   "text": "..."},
  {"direction": "wider",    "text": "..."},
  {"direction": "opposite", "text": "..."},
  {"direction": "deeper",   "text": "..."}
]
"""
output_format = "json"
