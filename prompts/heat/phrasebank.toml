# Heatmap phrase bank — soft, observational copy for the hover
# tooltip. Each metric has phrases bucketed by intensity. The
# renderer picks one stably per (paragraph, metric) by hashing the
# paragraph_ix so the same hover doesn't churn through phrases.
#
# Style notes: lowercase, no punctuation, two-three words. The
# tooltip should read like a noticing, not a label. Avoid metaphors
# that point at writing craft ("pacing is good", "this works") —
# the heatmap names the shape, not the quality.

[pacing.low]
phrases = [
    "holding",
    "resting",
    "slow burn",
    "unhurried",
    "patient",
    "still",
    "settled",
    "lingering",
]

[pacing.mid]
phrases = [
    "even pacing",
    "measured",
    "sustained",
    "moving",
    "steady",
    "set forth",
    "in step",
]

[pacing.high]
phrases = [
    "running",
    "quick",
    "dense",
    "rushing",
    "racing",
    "tight pulse",
    "in spate",
]

